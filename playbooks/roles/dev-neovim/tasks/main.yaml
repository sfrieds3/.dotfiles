---
- name: Clone neovim
  ansible.builtin.git:
    repo: https://github.com/sfrieds3/neovim
    dest: "{{ lookup('env', 'HOME') }}/code/personal"
    version: main
    update: false
- name: Build neovim
  become: true
  ansible.builtin.command: make_nvim
  args:
    chdir: "{{ lookup('env', 'HOME') }}/code/personal"
    creates: ~/.local/bin/nvim
  become_user: "{{ ansible_user }}"
