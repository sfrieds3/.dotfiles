- name: Install apt packages
  become: true
  ansible.builtin.apt:
    name: "{{ apt_packages }}"
    state: present

- name: Ensure $XDG_CONFIG_HOME folder is created
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.config"
    state: directory
    mode: '0755'

- name: Ensure $HOME/.local/bin folder is created
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.local/bin"
    state: directory
    mode: '0755'

- name: Check if rust is installed
  ansible.builtin.command:
    cmd: command -v rustc
  register: cargo_exists
  changed_when: false
  failed_when: false
  tags: rust

- name: Determine rustup target triple
  ansible.builtin.set_fact:
    rustup_target: "{{ rustup_target_map.get(ansible_architecture, '') }}"
  when: cargo_exists.rc != 0

- name: Validate rustup target mapping
  ansible.builtin.assert:
    that:
      - rustup_target | length > 0
    fail_msg: "Unsupported architecture for rustup bootstrap: {{ ansible_architecture }}"
  when: cargo_exists.rc != 0

- name: Download rustup-init
  ansible.builtin.get_url:
    url: >-
      https://static.rust-lang.org/rustup/archive/{{ rustup_version }}/{{ rustup_target }}/rustup-init
    dest: /tmp/rustup-init
    mode: '0755'
    checksum: >-
      sha256:https://static.rust-lang.org/rustup/archive/{{ rustup_version }}/{{ rustup_target }}/rustup-init.sha256
  when: cargo_exists.rc != 0

- name: Install Rust
  ansible.builtin.command:
    cmd: /tmp/rustup-init -y --no-modify-path
    creates: "{{ lookup('env', 'HOME') }}/.cargo/bin/rustc"
  when: cargo_exists.rc != 0
